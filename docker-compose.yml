version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:16-alpine
    container_name: rip-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_metadata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rip-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.19-community
    container_name: rip-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: rip-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: rip-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  # Agents (A2A Network)
  orchestrator-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-orchestrator
    ports:
      - "8100:8100"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - AGENT_NAME=orchestrator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  retrieval-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-retrieval-agent
    ports:
      - "8101:8101"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - AGENT_NAME=retrieval_agent
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  synthesis-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-synthesis-agent
    ports:
      - "8102:8102"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AGENT_NAME=synthesis_agent

  eval-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-eval-agent
    ports:
      - "8103:8103"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_HOST=postgres
      - AGENT_NAME=eval_agent
    depends_on:
      postgres:
        condition: service_healthy

  web-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-web-agent
    ports:
      - "8104:8104"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AGENT_NAME=web_agent

  # MCP Server
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-mcp-server
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - RUN_MODE=mcp
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # FastAPI API Gateway
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rip-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - RUN_MODE=api
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rip-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  redis_data:
