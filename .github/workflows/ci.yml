name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    env:
      MOCK_DB: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system -r pyproject.toml
          uv pip install --system pytest pytest-asyncio pytest-cov mypy ruff

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run MyPy Typechecker
        run: mypy backend/

      - name: Run Test Suite
        run: pytest backend/ --cov=backend --cov-report=xml

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run Linting
        run: |
          cd frontend
          npm run lint

  run-rag-benchmarks:
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      MOCK_DB: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -r pyproject.toml

      - name: Execute Evaluation Benchmark Runner
        run: |
          python -m backend.evaluation.benchmark_runner 5

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [run-rag-benchmarks]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/rip-backend:latest
